<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anta&family=Noto+Sans+JP:wght@100..900&family=Sawarabi+Mincho&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="./style.css" />
  <script src="./jQuery/jquery-4.0.0.min.js"></script>
  <script src="./jQuery/jquery.easing.min.js"></script>
  <title>北落合</title>
</head>

<body>
  <div id="dots">
    <div id="gradation"></div>
  </div>

  <main>
    <article>
      <section id="sectionProfile">
        <div class="sideLine"></div>
        <div class="sideLine" id="leftEnd"></div>
        <div id="pictures">
          <img src="./images/Hinagi01.png" id="imgQitaochi">
          <div id=checkitContainer>
            <img src="./images/Hinagi_Laugh.png" class="checkit">
            <img src="./images/Hinagi_Cry.png" class="checkit">
            <img src="./images/Hinagi_Angry.png" class="checkit">
            <img src="./images/Hinagi_Surprised.png" class="checkit">
            <img src="./images/Hinagi_Chill.png" class="checkit">
          </div>
          <h3 id="quote">「自分の好きなことを夢中でやっとーときが一番やわ。」</h2>
        </div>
        <div class="sideLine" id="middleLine"></div>
        <div id="profile">
          <div id="fullNameBox">
            <h1 id="fullName">落合　陽渚</h1>
            <h4 id="fullNameRuby">Hinagi Ochiai</h4>
          </div>

          <div id="introduce">
            <p>
              自分がやりたいと思ったことには、こだわりを持って時間をかけてでも成し遂げようとするが、人に頼るのが苦手で抱え込みがち。人と同じでは認められないと思っており、逆張り気質がある。常識性を加味することで、スルーされがちなことによく気がつく。
            </p>
          </div>


          <table id="tableProfile">
            <tbody>
              <tr class="trProfile">
                <th class="thProfile">username</th>
                <td class="tdProfile">北落合</td>
              </tr>
              <tr class="trProfile">
                <th class="thProfile">from</th>
                <td class="tdProfile">兵庫県 神戸市北区</td>
              </tr>
              <tr class="trProfile">
                <th class="thProfile">birthday</th>
                <td class="tdProfile">2005年 4月18日</td>
              </tr>
              <tr class="trProfile">
                <th class="thProfile">blood type</th>
                <td class="tdProfile">AB</td>
              </tr>
            </tbody>
          </table>

        </div>
        <div class="sideLine" id="rightEnd"></div>
        <div id="services">
          <a href="https://twitter.com/intent/user?user_id=1079621252375932929" class="aService">
            <p class="pService" id="pServiceX">X　@Qitaochi</p>
          </a>
          <a href="https://discord.gg/qKZGB2Pw" class="aService">
            <p class="pService" id="pServiceDiscord">Discord　qitaochi</p>
          </a>
          <a href="https://github.com/Qitaochi" class="aService">
            <p class="pService" id="pServiceGitHub">GitHub　Qitaochi</p>
          </a>
        </div>
      </section>
    </article>
  </main>

  <script src="script.js"></script>
